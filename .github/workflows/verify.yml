name: Verify project
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 22 }
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 10 }
      - name: Install and check backend
        working-directory: backend
        run: pnpm install --frozen-lockfile && pnpm run check
      - name: Install and build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm run build
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - name: Start backend
        working-directory: backend
        env:
          PORT: 3000
          DATABASE_PATH: /tmp/bugboard26-ci.sqlite
          JWT_SECRET: github-actions-secret-with-at-least-thirty-two-characters
        run: |
          nohup node src/server.js > /tmp/bugboard26.log 2>&1 &
      - name: Wait for backend
        run: for i in {1..30}; do curl -fsS http://localhost:3000/api/health && exit 0; sleep 1; done; exit 1
      - name: Run JUnit API tests
        working-directory: tests/junit
        run: mvn -B -Dbugboard.baseUrl=http://localhost:3000/api test
